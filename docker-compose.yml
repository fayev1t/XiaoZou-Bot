services:
  qqbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qqbot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./logs:/app/logs
      - ./sqlite_data:/app/sqlite_data
    command: ["python", "-m", "qqbot"]
