services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat_qqbot
    restart: unless-stopped
    ports:
      - "7501:6099"
      - "7502:3000"
      - "7503:3001"
    environment:
      NAPCAT_UID: ${UID}
      NAPCAT_GID: ${GID}
    network_mode: bridge
    volumes:
      - "./QQ:/app/.config/QQ"
      - "./config:/app/napcat/config"
      - "./plugins:/app/napcat/plugins"
